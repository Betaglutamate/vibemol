<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>VibeMol</title>
    <style>
      :root { --fg: #cdd3da; --dim: #6a7280; --accent: #6fd3ff; --bg: #11151a; }
      html, body { margin: 0; height: 100%; overflow: hidden; background: #0b0d10;
        font: 13px/1.4 ui-monospace, SFMono-Regular, Menlo, monospace; color: var(--fg); }
      #app { position: fixed; inset: 0; }

      .vm-hud { position: fixed; top: 10px; left: 14px; z-index: 10; pointer-events: none; }
      .vm-hud b { color: var(--accent); }
      .vm-dim, .vm-status { color: var(--dim); }

      .vm-toolbar { position: fixed; top: 8px; left: 50%; transform: translateX(-50%);
        z-index: 10; display: flex; align-items: center; gap: 5px; flex-wrap: wrap;
        background: rgba(17,21,26,0.9); border: 1px solid #232a32; border-radius: 8px;
        padding: 6px 10px; max-width: 92vw; }
      .vm-label { color: var(--dim); margin: 0 2px; }
      .vm-sep { width: 1px; height: 18px; background: #2c343d; margin: 0 4px; }
      .vm-btn { background: #1d242c; color: var(--fg); border: 1px solid #2c343d;
        border-radius: 6px; padding: 4px 9px; cursor: pointer; font: inherit; }
      .vm-btn:hover { background: #28313b; border-color: #3a4654; }
      .vm-btn.vm-active { background: #2a6f8a; border-color: #6fd3ff; color: #fff; }
      .vm-input { background: #0e1216; color: var(--fg); border: 1px solid #2c343d;
        border-radius: 6px; padding: 4px 8px; font: inherit; }

      .vm-panel { position: fixed; top: 64px; right: 12px; z-index: 10; width: 240px;
        background: rgba(17,21,26,0.92); border: 1px solid #232a32; border-radius: 8px;
        padding: 10px 12px; }
      .vm-panel-title { color: var(--accent); margin: 6px 0 4px; font-weight: bold; }
      .vm-list { display: flex; flex-direction: column; gap: 3px; }
      .vm-row { display: flex; justify-content: space-between; align-items: center; gap: 8px; }
      .vm-x { background: none; border: none; color: var(--dim); cursor: pointer; font: inherit; }
      .vm-x:hover { color: #ff6b6b; }

      .vm-traj { position: fixed; bottom: 305px; left: 50%; transform: translateX(-50%);
        z-index: 10; display: flex; align-items: center; gap: 8px;
        background: rgba(17,21,26,0.92); border: 1px solid #232a32; border-radius: 8px;
        padding: 6px 12px; }
      .vm-slider { width: 220px; }

      .vm-sequence { position: fixed; bottom: 190px; left: 0; right: 0; z-index: 10;
        max-height: 110px; overflow-y: auto; padding: 4px 12px;
        background: rgba(11,13,16,0.6); }
      .vm-seq-row { white-space: nowrap; }
      .vm-seq-label { color: var(--accent); margin-right: 8px; }
      .vm-res { cursor: pointer; padding: 0 1px; color: #aab2bd; }
      .vm-res:hover { background: #ff3df0; color: #000; }

      .vm-console { position: fixed; bottom: 0; left: 0; right: 0; z-index: 10;
        background: rgba(11,13,16,0.95); border-top: 1px solid #232a32; }
      .vm-log { max-height: 150px; overflow-y: auto; padding: 8px 12px; }
      .vm-log-line { white-space: pre-wrap; }
      .vm-log-err { white-space: pre-wrap; color: #ff7a7a; }
      .vm-console-input { width: 100%; box-sizing: border-box; background: #0e1216;
        color: var(--fg); border: none; border-top: 1px solid #232a32; padding: 8px 12px;
        font: inherit; outline: none; }
    </style>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
