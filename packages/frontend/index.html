<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>VibeMol</title>
    <style>
      :root {
        --bg: #07090c;
        --panel: rgba(18, 22, 28, 0.78);
        --panel-solid: #12161c;
        --border: #262d37;
        --border-soft: #1d232b;
        --fg: #d4dae1;
        --dim: #79828f;
        --accent: #5fd0ff;
        --accent-2: #ff5cc8;
        --hover: #222a34;
        --radius: 12px;
        --shadow: 0 8px 28px rgba(0, 0, 0, 0.45);
        --font: 13px/1.45 -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        --mono: 12px/1.5 ui-monospace, SFMono-Regular, Menlo, monospace;
      }
      * { box-sizing: border-box; }
      html, body { margin: 0; height: 100%; overflow: hidden; background: var(--bg);
        font: var(--font); color: var(--fg); -webkit-font-smoothing: antialiased; }
      #app { position: fixed; inset: 0; }
      button { font: inherit; color: inherit; cursor: pointer; }
      ::-webkit-scrollbar { width: 9px; height: 9px; }
      ::-webkit-scrollbar-thumb { background: #2a323d; border-radius: 6px; }
      ::-webkit-scrollbar-track { background: transparent; }

      /* ---- glass card shared look ---- */
      .vm-card { background: var(--panel); backdrop-filter: blur(14px);
        -webkit-backdrop-filter: blur(14px); border: 1px solid var(--border);
        border-radius: var(--radius); box-shadow: var(--shadow); }

      /* ---- header ---- */
      .vm-header { position: fixed; top: 0; left: 0; right: 0; height: 50px; z-index: 30;
        display: flex; align-items: center; gap: 14px; padding: 0 16px;
        background: rgba(10, 13, 17, 0.85); backdrop-filter: blur(14px);
        border-bottom: 1px solid var(--border-soft); }
      .vm-brand { display: flex; align-items: center; gap: 9px; font-weight: 650; font-size: 15px;
        letter-spacing: 0.01em; }
      .vm-logo { width: 18px; height: 18px; border-radius: 5px;
        background: linear-gradient(135deg, var(--accent), var(--accent-2)); }
      .vm-brand small { color: var(--dim); font-weight: 500; font-size: 11px; }
      .vm-spacer { flex: 1; }
      .vm-status { display: flex; align-items: center; gap: 7px; color: var(--dim);
        font-size: 12px; padding: 4px 10px; border-radius: 999px; border: 1px solid var(--border-soft); }
      .vm-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--dim); }
      .vm-dot.ok { background: #46d18a; box-shadow: 0 0 6px #46d18a; }
      .vm-dot.err { background: #ff6b6b; box-shadow: 0 0 6px #ff6b6b; }

      /* ---- side panels ---- */
      .vm-left { position: fixed; top: 62px; left: 14px; width: 212px; z-index: 20; }
      .vm-right { position: fixed; top: 62px; right: 14px; width: 248px; z-index: 20;
        bottom: 150px; display: flex; flex-direction: column; }
      .vm-left, .vm-right { max-height: calc(100vh - 220px); }
      .vm-scroll { overflow-y: auto; }

      .vm-section { padding: 12px 13px; border-bottom: 1px solid var(--border-soft); }
      .vm-section:last-child { border-bottom: none; }
      .vm-title { font-size: 10px; font-weight: 700; letter-spacing: 0.09em;
        text-transform: uppercase; color: var(--dim); margin: 0 0 9px; display: flex;
        align-items: center; justify-content: space-between; }

      /* ---- buttons ---- */
      .vm-btn { background: #1a212a; border: 1px solid var(--border); border-radius: 8px;
        padding: 6px 10px; transition: background 0.12s, border-color 0.12s; }
      .vm-btn:hover { background: var(--hover); border-color: #3a4654; }
      .vm-btn:active { transform: translateY(1px); }
      .vm-btn.active { background: linear-gradient(135deg, #1f5d75, #2a4d6e);
        border-color: var(--accent); color: #fff; }
      .vm-icon-btn { display: inline-flex; align-items: center; gap: 6px; }

      .vm-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; }
      .vm-grid .vm-btn { padding: 7px 6px; text-align: center; font-size: 12px; }

      /* representation chips with a leading glyph */
      .vm-rep { display: flex; align-items: center; gap: 6px; justify-content: center; }
      .vm-rep i { width: 9px; height: 9px; border-radius: 2px; background: #4a5663; font-style: normal; }

      /* color swatches */
      .vm-swatches { display: grid; grid-template-columns: repeat(8, 1fr); gap: 5px; margin-bottom: 8px; }
      .vm-swatch { width: 100%; aspect-ratio: 1; border-radius: 6px; border: 1px solid rgba(255,255,255,0.14);
        cursor: pointer; transition: transform 0.1s; }
      .vm-swatch:hover { transform: scale(1.12); border-color: #fff; }
      .vm-schemes { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 6px; }

      .vm-load-row { display: flex; gap: 6px; margin-top: 7px; }
      .vm-input { flex: 1; min-width: 0; background: #0c1014; color: var(--fg);
        border: 1px solid var(--border); border-radius: 8px; padding: 6px 9px; outline: none; }
      .vm-input:focus { border-color: var(--accent); }
      .vm-hint { color: var(--dim); font-size: 11px; margin-top: 8px; }

      /* apply-to target chip */
      .vm-apply { display: flex; align-items: center; gap: 8px; margin-bottom: 9px; }
      .vm-apply-label { color: var(--dim); font-size: 11px; }
      .vm-chip { font-size: 11px; padding: 3px 9px; border-radius: 999px; cursor: pointer;
        background: #1a212a; border: 1px solid var(--border); color: var(--dim); }
      .vm-chip.set { background: rgba(255,92,200,0.16); border-color: var(--accent-2);
        color: #ffc4ec; }
      .vm-chip.set::after { content: " ✕"; opacity: 0.7; }

      /* lists (objects / selections) */
      .vm-list { display: flex; flex-direction: column; gap: 4px; }
      .vm-row { display: flex; justify-content: space-between; align-items: center; gap: 6px;
        padding: 5px 8px; border-radius: 7px; background: rgba(255,255,255,0.02); }
      .vm-row:hover { background: rgba(255,255,255,0.05); }
      .vm-row.active { background: rgba(255,92,200,0.14); box-shadow: inset 0 0 0 1px var(--accent-2); }
      .vm-sel .name { cursor: pointer; flex: 1; }
      .vm-row .name { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
      .vm-rename { flex: 1; min-width: 0; background: #0c1014; color: var(--fg);
        border: 1px solid var(--accent); border-radius: 5px; padding: 2px 6px; font: inherit; outline: none; }
      .vm-row .meta { color: var(--dim); font-size: 11px; }
      .vm-x { background: none; border: none; color: var(--dim); padding: 0 2px; }
      .vm-x:hover { color: #ff6b6b; }
      .vm-empty { color: var(--dim); font-size: 12px; font-style: italic; }

      /* sequence */
      .vm-seq { font: var(--mono); }
      .vm-seq-row { white-space: nowrap; margin-bottom: 3px; }
      .vm-seq-label { color: var(--accent); margin-right: 8px; font-size: 11px; }
      .vm-res { cursor: pointer; padding: 0 1px; color: #9aa3af; border-radius: 2px; }
      .vm-res:hover { background: var(--accent-2); color: #000; }

      /* ---- bottom dock (trajectory + console) ---- */
      .vm-dock { position: fixed; bottom: 0; left: 0; right: 0; z-index: 25;
        background: rgba(10, 13, 17, 0.9); backdrop-filter: blur(14px);
        border-top: 1px solid var(--border-soft); }
      .vm-traj { display: none; align-items: center; gap: 10px; padding: 8px 16px;
        border-bottom: 1px solid var(--border-soft); }
      .vm-traj .vm-title { margin: 0; }
      .vm-slider { flex: 1; accent-color: var(--accent); }
      .vm-play { width: 30px; height: 26px; border-radius: 7px; background: #1a212a;
        border: 1px solid var(--border); }
      .vm-log { max-height: 116px; overflow-y: auto; padding: 8px 16px; font: var(--mono); }
      .vm-log-line { white-space: pre-wrap; color: #aeb6c0; }
      .vm-log-line.cmd { color: var(--accent); }
      .vm-log-line.err { color: #ff7a7a; }
      .vm-console-row { display: flex; align-items: center; gap: 8px; padding: 0 16px;
        border-top: 1px solid var(--border-soft); }
      .vm-prompt { color: var(--accent); font: var(--mono); }
      .vm-console-input { flex: 1; background: transparent; color: var(--fg); border: none;
        padding: 11px 0; font: var(--mono); outline: none; }
    </style>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
