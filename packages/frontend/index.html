<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>VibeMol</title>
    <style>
      :root {
        --bg: #07090c;
        --panel: rgba(18, 22, 28, 0.82);
        --border: #262d37;
        --border-soft: #1d232b;
        --fg: #d4dae1;
        --dim: #79828f;
        --accent: #5fd0ff;
        --accent-2: #ff5cc8;
        --hover: #222a34;
        --radius: 12px;
        --shadow: 0 8px 28px rgba(0, 0, 0, 0.45);
        --font: 13px/1.45 -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        --mono: 12px/1.5 ui-monospace, SFMono-Regular, Menlo, monospace;
      }
      * { box-sizing: border-box; }
      html, body { margin: 0; height: 100%; overflow: hidden; background: var(--bg);
        font: var(--font); color: var(--fg); -webkit-font-smoothing: antialiased; }
      #app { position: fixed; inset: 0; }
      button { font: inherit; color: inherit; cursor: pointer; }
      ::-webkit-scrollbar { width: 9px; height: 9px; }
      ::-webkit-scrollbar-thumb { background: #2a323d; border-radius: 6px; }
      ::-webkit-scrollbar-track { background: transparent; }

      .vm-card { background: var(--panel); backdrop-filter: blur(14px);
        -webkit-backdrop-filter: blur(14px); border: 1px solid var(--border);
        border-radius: var(--radius); box-shadow: var(--shadow); }
      .vm-btn { background: #1a212a; border: 1px solid var(--border); border-radius: 8px;
        padding: 6px 11px; transition: background 0.12s, border-color 0.12s; }
      .vm-btn:hover { background: var(--hover); border-color: #3a4654; }
      .vm-btn:active { transform: translateY(1px); }
      .vm-btn.primary { background: linear-gradient(135deg, #1f5d75, #2a4d6e); border-color: var(--accent); color: #fff; }
      .vm-sep { width: 1px; height: 18px; background: #2c343d; margin: 0 6px; display: inline-block; vertical-align: middle; }

      /* ---- top menu bar ---- */
      .vm-topbar { position: fixed; top: 0; left: 0; right: 0; height: 46px; z-index: 40;
        display: flex; align-items: center; gap: 14px; padding: 0 14px;
        background: rgba(10, 13, 17, 0.92); backdrop-filter: blur(14px);
        border-bottom: 1px solid var(--border-soft); }
      .vm-brand { display: flex; align-items: center; gap: 8px; font-weight: 650; font-size: 15px; }
      .vm-logo { width: 18px; height: 18px; border-radius: 5px;
        background: linear-gradient(135deg, var(--accent), var(--accent-2)); }
      .vm-spacer { flex: 1; }
      .vm-status { display: flex; align-items: center; gap: 7px; color: var(--dim); font-size: 12px;
        padding: 4px 10px; border-radius: 999px; border: 1px solid var(--border-soft); }
      .vm-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--dim); }
      .vm-dot.ok { background: #46d18a; box-shadow: 0 0 6px #46d18a; }
      .vm-dot.err { background: #ff6b6b; box-shadow: 0 0 6px #ff6b6b; }

      .vm-menus { display: flex; gap: 2px; }
      .vm-menu { position: relative; }
      .vm-menu-btn { background: none; border: none; padding: 6px 12px; border-radius: 7px; color: var(--fg); }
      .vm-menu-btn:hover, .vm-menu.open .vm-menu-btn { background: var(--hover); }
      .vm-dropdown { position: absolute; top: 100%; left: 0; min-width: 220px; display: none;
        z-index: 50; margin-top: 4px; padding: 5px; background: #161b22;
        border: 1px solid var(--border); border-radius: 10px; box-shadow: var(--shadow); }
      .vm-dropdown.open { display: block; }
      .vm-menu-item { display: flex; align-items: center; gap: 8px; padding: 7px 10px;
        border-radius: 6px; white-space: nowrap; position: relative; }
      .vm-menu-item:hover { background: var(--hover); }
      .vm-menu-sep { height: 1px; background: var(--border-soft); margin: 5px 6px; }
      .vm-check { width: 12px; color: var(--accent); }
      .vm-has-sub .vm-arrow { margin-left: auto; color: var(--dim); }
      .vm-submenu { top: -5px; left: 100%; margin: 0 0 0 3px; }
      .vm-has-sub:hover > .vm-submenu.vm-dropdown { display: block; }

      /* ---- quick-access toolbar ---- */
      .vm-quickbar { position: fixed; top: 56px; left: 50%; transform: translateX(-50%); z-index: 30;
        display: flex; align-items: center; gap: 6px; flex-wrap: wrap; padding: 6px 12px; max-width: 94vw; }
      .vm-q-label { color: var(--dim); font-size: 11px; margin: 0 2px; }
      .vm-swatch { width: 18px; height: 18px; border-radius: 5px; cursor: pointer;
        border: 1px solid rgba(255,255,255,0.14); transition: transform 0.1s; }
      .vm-swatch:hover { transform: scale(1.15); border-color: #fff; }
      .vm-chip { font-size: 11px; padding: 4px 10px; border-radius: 999px; cursor: pointer;
        background: #1a212a; border: 1px solid var(--border); color: var(--dim); }
      .vm-chip.set { background: rgba(255,92,200,0.16); border-color: var(--accent-2); color: #ffc4ec; }
      .vm-chip.set::after { content: " ✕"; opacity: 0.7; }

      /* ---- right data panel ---- */
      .vm-right { position: fixed; top: 108px; right: 14px; width: 340px; z-index: 20; bottom: 150px;
        display: flex; flex-direction: column; }
      .vm-scroll { overflow-y: auto; }

      /* script editor (left dock) */
      .vm-editor { position: fixed; top: 108px; left: 14px; width: 340px; bottom: 150px; z-index: 20;
        display: flex; flex-direction: column; overflow: hidden; }
      .vm-editor-head { display: flex; align-items: center; gap: 6px; padding: 9px 11px;
        border-bottom: 1px solid var(--border-soft); }
      .vm-editor-head .vm-title { margin: 0; }
      .vm-editor-head .vm-btn { padding: 3px 9px; font-size: 12px; }
      .vm-code-wrap { flex: 1; display: flex; overflow: hidden; font: var(--mono); }
      .vm-gutter { padding: 8px 6px 8px 10px; text-align: right; color: #4b5563;
        background: rgba(0,0,0,0.18); white-space: pre; overflow: hidden; user-select: none;
        line-height: 1.5; }
      .vm-code { flex: 1; resize: none; border: none; outline: none; background: transparent;
        color: var(--fg); padding: 8px 10px; font: var(--mono); line-height: 1.5; tab-size: 2;
        white-space: pre; overflow: auto; }
      .vm-editor-hint { padding: 6px 11px; font-size: 11px; color: var(--dim);
        border-top: 1px solid var(--border-soft); }
      .vm-section { padding: 12px 13px; border-bottom: 1px solid var(--border-soft); }
      .vm-section:last-child { border-bottom: none; }
      .vm-title { font-size: 10px; font-weight: 700; letter-spacing: 0.09em; text-transform: uppercase;
        color: var(--dim); margin: 0 0 9px; }
      .vm-list { display: flex; flex-direction: column; gap: 4px; }
      .vm-row { display: flex; justify-content: space-between; align-items: center; gap: 6px;
        padding: 5px 8px; border-radius: 7px; background: rgba(255,255,255,0.02); }
      .vm-row:hover { background: rgba(255,255,255,0.05); }
      .vm-row.active { background: rgba(255,92,200,0.14); box-shadow: inset 0 0 0 1px var(--accent-2); }
      .vm-obj-block { border-bottom: 1px solid var(--border-soft); padding-bottom: 6px; margin-bottom: 4px; }
      .vm-obj-block:last-child { border-bottom: none; margin-bottom: 0; }
      .vm-obj-header { display: flex; align-items: center; gap: 5px; padding: 5px 4px; cursor: pointer;
        border-radius: 7px; user-select: none; }
      .vm-obj-header:hover { background: rgba(255,255,255,0.05); }
      .vm-obj-header.hidden { opacity: 0.4; }
      .vm-obj-name { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
        font-weight: 600; font-size: 12px; }
      .vm-obj-name .meta { color: var(--dim); font-size: 11px; font-weight: 400; }
      .vm-caret { font-size: 10px; width: 12px; display: inline-block; flex-shrink: 0; color: var(--dim); }
      .vm-eye { color: var(--accent); }
      .vm-row.hidden .vm-eye { color: var(--dim); }
      .vm-sel .name { cursor: pointer; flex: 1; }
      .vm-row .name { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
      .vm-row .meta { color: var(--dim); font-size: 11px; }
      .vm-x { background: none; border: none; color: var(--dim); padding: 0 2px; }
      .vm-x:hover { color: #ff6b6b; }
      .vm-empty { color: var(--dim); font-size: 12px; font-style: italic; }

      .vm-seq { font: var(--mono); }
      .vm-seq-chain { padding-left: 16px; margin-bottom: 4px; }
      .vm-seq-chain-label { color: var(--accent); font-size: 11px; font-weight: 600; margin-bottom: 2px;
        cursor: pointer; user-select: none; display: flex; align-items: center; gap: 2px;
        padding: 2px 0; border-radius: 4px; }
      .vm-seq-chain-label:hover { color: #fff; }
      .vm-seq-chain-label .meta { color: var(--dim); font-size: 10px; font-weight: 400; }
      .vm-seq-line { display: flex; align-items: center; height: 20px; }
      .vm-seq-num { color: var(--dim); font-size: 10px; width: 36px; text-align: right;
        margin-right: 6px; flex-shrink: 0; user-select: none; }
      .vm-seq-letters { display: flex; gap: 0; }
      .vm-lig-row { padding-left: 16px; margin-bottom: 4px; }
      .vm-lig-label { color: #e0a040; font-size: 11px; font-weight: 600; margin-bottom: 2px; }
      .vm-lig-chips { display: flex; flex-wrap: wrap; gap: 4px; padding-left: 42px; }
      .vm-res { cursor: pointer; padding: 1px 1.5px; color: #9aa3af; border-radius: 2px; font-size: 12px;
        font-family: 'SF Mono', 'Menlo', 'Consolas', monospace; }
      .vm-res:hover { background: var(--accent-2); color: #000; }
      .vm-res.selected { background: rgba(255, 92, 200, 0.25); color: #fff; }
      .vm-res.selected:hover { background: rgba(255, 92, 200, 0.45); }
      .vm-res.vm-ligand { color: #e0a040; background: rgba(224, 160, 64, 0.12);
        padding: 2px 5px; border-radius: 3px; font-weight: 600; font-size: 11px; }
      .vm-res.vm-ligand:hover { background: rgba(224, 160, 64, 0.35); color: #fff; }
      .vm-res.vm-ligand.selected { background: rgba(224, 160, 64, 0.4); color: #fff; }

      /* ---- bottom dock ---- */
      .vm-dock { position: fixed; bottom: 0; left: 0; right: 0; z-index: 25;
        background: rgba(10, 13, 17, 0.92); backdrop-filter: blur(14px); border-top: 1px solid var(--border-soft); }
      .vm-traj { display: none; align-items: center; gap: 10px; padding: 8px 16px; border-bottom: 1px solid var(--border-soft); }
      .vm-slider { flex: 1; accent-color: var(--accent); }
      .vm-play { width: 30px; height: 26px; border-radius: 7px; background: #1a212a; border: 1px solid var(--border); }
      .vm-log { max-height: 116px; overflow-y: auto; padding: 8px 16px; font: var(--mono); }
      .vm-log-line { white-space: pre-wrap; color: #aeb6c0; }
      .vm-log-line.cmd { color: var(--accent); }
      .vm-log-line.err { color: #ff7a7a; }
      .vm-console-row { display: flex; align-items: center; gap: 8px; padding: 0 16px; border-top: 1px solid var(--border-soft); }
      .vm-prompt { color: var(--accent); font: var(--mono); }
      .vm-console-input { flex: 1; background: transparent; color: var(--fg); border: none; padding: 11px 0; font: var(--mono); outline: none; }

      /* ---- modal dialog ---- */
      .vm-modal-overlay { position: fixed; inset: 0; z-index: 100; display: flex; align-items: center;
        justify-content: center; background: rgba(0,0,0,0.45); }
      .vm-modal { width: 340px; max-width: 90vw; padding: 18px; background: #161b22;
        border: 1px solid var(--border); border-radius: 12px; box-shadow: var(--shadow); }
      .vm-modal-title { font-weight: 650; font-size: 15px; margin-bottom: 14px; }
      .vm-field { display: flex; flex-direction: column; gap: 4px; margin-bottom: 11px; }
      .vm-field-label { color: var(--dim); font-size: 11px; }
      .vm-input { background: #0c1014; color: var(--fg); border: 1px solid var(--border);
        border-radius: 8px; padding: 7px 10px; outline: none; }
      .vm-input:focus { border-color: var(--accent); }
      .vm-modal-actions { display: flex; justify-content: flex-end; gap: 8px; margin-top: 16px; }

      /* ---- measure hint toast ---- */
      .vm-hint-toast { position: fixed; top: 108px; left: 50%; transform: translateX(-50%); z-index: 60;
        padding: 8px 16px; background: rgba(95,208,255,0.14); border: 1px solid var(--accent);
        border-radius: 999px; color: #cdeeff; font-size: 12px; }
    </style>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
