<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="320" viewBox="0 0 1280 320" fill="none" role="img" aria-label="VibeMol — web-native molecular visualization">
  <defs>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#5fd0ff"/>
      <stop offset="1" stop-color="#ff5cc8"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.78" cy="0.4" r="0.6">
      <stop offset="0" stop-color="#16324a" stop-opacity="0.9"/>
      <stop offset="1" stop-color="#0b0d10" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="bond" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#5fd0ff"/>
      <stop offset="1" stop-color="#ff5cc8"/>
    </linearGradient>
  </defs>

  <!-- backdrop -->
  <rect width="1280" height="320" rx="20" fill="#0b0d10"/>
  <rect width="1280" height="320" rx="20" fill="url(#glow)"/>
  <rect x="1" y="1" width="1278" height="318" rx="19" fill="none" stroke="#222a32" stroke-width="2"/>

  <!-- molecule motif: benzene ring (CPK-ish) on the right -->
  <g stroke-width="7" stroke-linecap="round">
    <line x1="1070" y1="160" x2="1035" y2="220.6" stroke="url(#bond)"/>
    <line x1="1035" y1="220.6" x2="965" y2="220.6" stroke="url(#bond)"/>
    <line x1="965" y1="220.6" x2="930" y2="160" stroke="url(#bond)"/>
    <line x1="930" y1="160" x2="965" y2="99.4" stroke="url(#bond)"/>
    <line x1="965" y1="99.4" x2="1035" y2="99.4" stroke="url(#bond)"/>
    <line x1="1035" y1="99.4" x2="1070" y2="160" stroke="url(#bond)"/>
    <!-- a couple of substituent bonds -->
    <line x1="1070" y1="160" x2="1130" y2="160" stroke="#3a4654"/>
    <line x1="930" y1="160" x2="870" y2="160" stroke="#3a4654"/>
  </g>
  <g>
    <circle cx="1070" cy="160" r="15" fill="#5fd0ff"/>
    <circle cx="1035" cy="220.6" r="15" fill="#7bbef0"/>
    <circle cx="965" cy="220.6" r="15" fill="#a98be0"/>
    <circle cx="930" cy="160" r="15" fill="#ff5cc8"/>
    <circle cx="965" cy="99.4" r="15" fill="#c77ad6"/>
    <circle cx="1035" cy="99.4" r="15" fill="#86bdee"/>
    <circle cx="1130" cy="160" r="9" fill="#4a5663"/>
    <circle cx="870" cy="160" r="9" fill="#4a5663"/>
  </g>

  <!-- logo tile + wordmark -->
  <rect x="96" y="116" width="40" height="40" rx="11" fill="url(#accent)"/>
  <text x="152" y="150" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="62" font-weight="800" letter-spacing="-1" fill="url(#accent)">VibeMol</text>

  <!-- tagline -->
  <text x="98" y="196" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="26" font-weight="500" fill="#cdd3da">Web-native molecular visualization</text>
  <text x="98" y="230" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="16" fill="#79828f">PyMOL core functionality, in the browser · free &amp; open source</text>

  <!-- chips -->
  <g font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="13" fill="#9aa3af">
    <rect x="98" y="252" width="118" height="26" rx="13" fill="#11161c" stroke="#262d37"/>
    <text x="114" y="269">Python · FastAPI</text>
    <rect x="226" y="252" width="132" height="26" rx="13" fill="#11161c" stroke="#262d37"/>
    <text x="242" y="269">TypeScript · Three.js</text>
    <rect x="368" y="252" width="70" height="26" rx="13" fill="#11161c" stroke="#262d37"/>
    <text x="384" y="269">WebGL</text>
  </g>
</svg>
